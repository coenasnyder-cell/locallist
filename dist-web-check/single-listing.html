<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Details - Local List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .header-row {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
    }

    .back-button {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #475569;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-button:hover {
      color: #475569;
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      color: #475569;
      flex: 1;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .gallery {
      margin-bottom: 24px;
    }

    .main-image {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .image-placeholder {
      width: 100%;
      height: 300px;
      background: #eee;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      margin-bottom: 12px;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #ddd;
      object-fit: cover;
      flex-shrink: 0;
      transition: border-color 0.3s;
    }

    .thumbnail:hover,
    .thumbnail.active {
      border-color: #475569;
    }

    .details {
      margin-top: 24px;
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .price {
      font-size: 24px;
      color: #475569;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .meta-items {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }

    .description {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 15px;
      line-height: 1.6;
      color: #555;
    }

    .seller-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
    }

    .seller-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .seller-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .seller-name {
      font-size: 16px;
      font-weight: 600;
      color: #475569;
    }

    .seller-location {
      font-size: 14px;
      color: #666;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;      flex-wrap: wrap;    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #475569;
      color: #fff;
      flex: 1;
    }

    .btn-message {
      padding: 10px 16px;
      font-size: 14px;
      flex: 0 0 auto;
    }

    .btn-primary:hover {
      background: #3a4654;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .btn-danger {
      background: #ff6b6b;
      color: #fff;
    }

    .btn-danger:hover {
      background: #ff5252;
    }

    .btn-secondary.saved {
      background: #4caf50;
      color: #fff;
    }

    .btn-secondary.saved:hover {
      background: #45a049;
    }

    .expired-badge {
      display: inline-block;
      background: #ffebee;
      color: #c62828;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 20px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #messageModal .modal-header {
      color: #475569;
    }

    #reportModal .modal-header {
      color: #475569;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      margin-bottom: 20px;
    }

    .modal-label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }

    .modal-textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
    }

    .modal-textarea:focus {
      outline: none;
      border-color: #475569;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .card {
        padding: 16px;
      }

      .title {
        font-size: 22px;
      }

      .price {
        font-size: 20px;
      }

      .meta-items {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="header-container"></div>

  <div class="container">
    <div class="header-row">
      <button class="back-button" onclick="window.history.back()">←</button>
      <h1 class="page-title">Back</h1>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <div id="content">
      <div class="loading">Loading listing...</div>
    </div>
  </div>

  <!-- Message Seller Modal -->
  <div id="messageModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        Message Seller
        <button class="modal-close" onclick="closeMessageModal()">×</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Start a conversation (optional)</label>
        <textarea 
          id="initialMessage" 
          class="modal-textarea" 
          placeholder="Hi, I'm interested in this item..."
          onkeydown="if(event.ctrlKey && event.key === 'Enter') startThread()"></textarea>
        <p style="font-size: 16px; color: #999; margin-top: 8px;">Press Ctrl+Enter to send</p>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeMessageModal()">Cancel</button>
        <button class="btn btn-primary" onclick="startThread()">Send Message</button>
      </div>
    </div>
  </div>

  <!-- Report Listing Modal -->
  <div id="reportModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        Report Listing
        <button class="modal-close" onclick="closeReportModal()">×</button>
      </div>
      <div class="modal-body">
        <label class="modal-label" for="reportReason">Reason</label>
        <select id="reportReason" class="modal-textarea" style="min-height: auto;">
          <option value="">Select a reason</option>
          <option value="Spam">Spam</option>
          <option value="Prohibited item">Prohibited item</option>
          <option value="Fraud or scam">Fraud or scam</option>
          <option value="Harassment">Harassment</option>
          <option value="Other">Other</option>
        </select>
        <label class="modal-label" for="reportDetails" style="margin-top: 12px;">Details (optional)</label>
        <textarea
          id="reportDetails"
          class="modal-textarea"
          placeholder="Share any helpful details for our team"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeReportModal()">Cancel</button>
        <button class="btn btn-danger" id="submitReportBtn" onclick="submitReport()">Submit Report</button>
      </div>
    </div>
  </div>

  <!-- Save Listing Success Modal -->
  <div id="saveSuccessModal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px;">✓</div>
      <h2 style="color: #475569; margin-bottom: 12px; font-size: 20px;">Listing Saved!</h2>
      <p style="color: #666; margin-bottom: 24px;">Listing saved to your profile</p>
      <div class="modal-actions" style="flex-direction: column; gap: 12px;">
        <button class="btn btn-primary" style="width: 100%;" onclick="closeSaveModal()">Back to Listing</button>
        <button class="btn btn-secondary" style="width: 100%;" onclick="goToSavedListings()">Go to Saved Listings</button>
      </div>
    </div>
  </div>

  <!-- Already Saved Modal -->
  <div id="alreadySavedModal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px;">💾</div>
      <h2 style="color: #475569; margin-bottom: 12px; font-size: 20px;">Already Saved</h2>
      <p style="color: #666; margin-bottom: 24px;">This listing is already saved to your profile</p>
      <div class="modal-actions" style="flex-direction: column; gap: 12px;">
        <button class="btn btn-primary" style="width: 100%;" onclick="closeAlreadySavedModal()">Back to Listing</button>
        <button class="btn btn-secondary" style="width: 100%;" onclick="goToSavedListings()">Go to Saved Listings</button>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>

  <script src="header.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const app = window.firebaseApp;
    const auth = window.firebaseAuth;
    const db = window.firebaseDb;

    // Get listing ID from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    const promotionId = urlParams.get('promo');
    const listingViewSessionKey = listingId ? `listing_viewed_${listingId}` : null;
    const promotionStatsSession = new Set();

    let currentListing = null;

    function getTodayDateKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    async function trackDailyViewEvent(entityType, entityId, businessId) {
      if (!entityType || !entityId || !businessId) return;

      const dateKey = getTodayDateKey();
      const metricDocId = `${entityType}_${entityId}_${dateKey}`;
      try {
        await db.collection('analyticsDailyViews').doc(metricDocId).set({
          entityType,
          entityId,
          businessId,
          dateKey,
          viewCount: firebase.firestore.FieldValue.increment(1),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
      } catch (error) {
        console.warn('Could not track daily listing view analytics:', error);
      }
    }

    async function trackPromotionDailyEvent(sourceType, eventType, businessId, dedupeKey) {
      if (!promotionId || !sourceType || !eventType || !businessId) return;
      if (dedupeKey && promotionStatsSession.has(dedupeKey)) return;

      const dateKey = getTodayDateKey();
      const docId = `${promotionId}_${dateKey}`;
      try {
        await db.collection('promotionDailyStats').doc(docId).set({
          promotionId,
          businessId,
          sourceType,
          dateKey,
          impressions: eventType === 'impression' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0),
          clicks: eventType === 'click' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0),
          leads: eventType === 'lead' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
        if (dedupeKey) promotionStatsSession.add(dedupeKey);
      } catch (error) {
        console.warn('Could not track promotion daily stats:', error);
      }
    }

    async function incrementListingViewCount(listing) {
      if (!listing || !listing.id || !listingViewSessionKey) return;
      if (sessionStorage.getItem(listingViewSessionKey) === '1') return;

      const viewerUid = auth?.currentUser?.uid || null;
      if (viewerUid && listing.userId && viewerUid === listing.userId) {
        sessionStorage.setItem(listingViewSessionKey, '1');
        return;
      }

      try {
        await db.collection('listings').doc(listing.id).update({
          viewCount: firebase.firestore.FieldValue.increment(1)
        });
        if (listing.businessId) {
          await trackDailyViewEvent('listing', listing.id, listing.businessId);
        }
        sessionStorage.setItem(listingViewSessionKey, '1');
      } catch (error) {
        console.warn('Could not increment listing view count:', error);
      }
    }

    async function loadListing() {
      const contentDiv = document.getElementById('content');

      if (!listingId) {
        contentDiv.innerHTML = '<div class="error-message" style="display: block;">Listing not found</div>';
        return;
      }

      try {
        const listingDoc = await db.collection('listings').doc(listingId).get();

        if (!listingDoc.exists) {
          contentDiv.innerHTML = '<div class="error-message" style="display: block;">Listing not found</div>';
          return;
        }

        currentListing = { id: listingDoc.id, ...listingDoc.data() };
        await incrementListingViewCount(currentListing);
        await trackPromotionDailyEvent('marketplace', 'click', currentListing.userId || currentListing.businessId || '', `click_marketplace_${promotionId}_${currentListing.id}`);
        renderListing();
      } catch (error) {
        console.error('Error loading listing:', error);
        contentDiv.innerHTML = '<div class="error-message" style="display: block;">Error loading listing</div>';
      }
    }

    function isExpired() {
      if (!currentListing.expiresAt) return false;
      const expiresAt = currentListing.expiresAt.toDate
        ? currentListing.expiresAt.toDate()
        : new Date(currentListing.expiresAt);
      return expiresAt < new Date();
    }

    function renderListing() {
      const contentDiv = document.getElementById('content');
      
      const images = currentListing.images || [];
      const mainImage = images[0] || null;
      const thumbnails = images.slice(1);

      const eventDateStr = currentListing.eventDate ? `<div class="meta-item">
        <div class="meta-label">Event Date</div>
        <div class="meta-value">${currentListing.eventDate}</div>
      </div>` : '';

      const expiredBadge = isExpired() ? `<div class="expired-badge">This listing has expired</div>` : '';

      const imageGallery = mainImage 
        ? `<img src="${mainImage}" alt="Main listing image" class="main-image" id="mainImage">`
        : `<div class="image-placeholder">No Images</div>`;

      const thumbnailsHTML = thumbnails.length > 0 
        ? `<div class="thumbnails">
            ${images.map((img, idx) => `
              <img 
                src="${img}" 
                alt="Listing image ${idx + 1}" 
                class="thumbnail ${idx === 0 ? 'active' : ''}"
                onclick="changeMainImage(this.src, event)"
              />
            `).join('')}
          </div>`
        : '';

      contentDiv.innerHTML = `
        <div class="card">
          <div class="gallery">
            ${imageGallery}
            ${thumbnailsHTML}
          </div>

          <div class="details">
            ${expiredBadge}
            <h2 class="title">${currentListing.title}</h2>
            <div class="price">$${currentListing.price?.toFixed(2) || '0.00'}</div>

            <div class="meta-items">
              <div class="meta-item">
                <div class="meta-label">Category</div>
                <div class="meta-value">${currentListing.category}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">Condition</div>
                <div class="meta-value">${currentListing.condition}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">Location</div>
                <div class="meta-value">${currentListing.city || 'TBD'}</div>
              </div>
              ${eventDateStr}
            </div>

            <div class="description">
              ${currentListing.description}
            </div>

            <div class="seller-section">
              <div class="seller-title">Seller Information</div>
              <div class="seller-info">
                <div class="seller-name">${currentListing.sellerName}</div>
                <div class="seller-location">📍 ${currentListing.city || 'TBD'}</div>
              </div>
            </div>

            <div class="actions">
              <button class="btn btn-primary btn-message" onclick="openMessageModal()">Message Seller</button>
              <button class="btn btn-secondary" id="saveListing" onclick="saveListing()">Save Listing</button>
              <button class="btn btn-danger" onclick="openReportModal()">Report Listing</button>
            </div>
          </div>
        </div>
      `;
    }

    function changeMainImage(src, event) {
      event.preventDefault();
      const mainImage = document.getElementById('mainImage');
      if (mainImage) {
        mainImage.src = src;
      }
      
      // Update active thumbnail
      document.querySelectorAll('.thumbnail').forEach(thumb => {
        thumb.classList.remove('active');
      });
      event.target.classList.add('active');
    }

    function openMessageModal() {
      const user = auth.currentUser;
      if (!user) {
        alert("Please log in to message sellers.");
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('messageModal').classList.add('active');
      document.getElementById('initialMessage').focus();
    }

    function closeMessageModal() {
      document.getElementById('messageModal').classList.remove('active');
      document.getElementById('initialMessage').value = '';
    }

    function openReportModal() {
      const user = auth.currentUser;
      if (!user) {
        alert("Please log in to report listings.");
        window.location.href = 'login.html';
        return;
      }
      if (!currentListing) {
        alert('Listing details are still loading. Please try again.');
        return;
      }
      document.getElementById('reportModal').classList.add('active');
      document.getElementById('reportReason').focus();
    }

    function closeReportModal() {
      document.getElementById('reportModal').classList.remove('active');
      document.getElementById('reportReason').value = '';
      document.getElementById('reportDetails').value = '';
      const submitBtn = document.getElementById('submitReportBtn');
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Report';
      }
    }

    // Close modal when clicking outside
    document.addEventListener('DOMContentLoaded', () => {
      const messageModal = document.getElementById('messageModal');
      const reportModal = document.getElementById('reportModal');
      messageModal.addEventListener('click', (e) => {
        if (e.target === messageModal) {
          closeMessageModal();
        }
      });
      reportModal.addEventListener('click', (e) => {
        if (e.target === reportModal) {
          closeReportModal();
        }
      });
    });

    async function submitReport() {
      const user = auth.currentUser;
      if (!user) {
        alert("Please log in to report listings.");
        window.location.href = 'login.html';
        return;
      }

      if (!currentListing) {
        alert('Listing details are still loading. Please try again.');
        return;
      }

      const reason = document.getElementById('reportReason').value.trim();
      const details = document.getElementById('reportDetails').value.trim();

      if (!reason) {
        alert('Please select a reason for the report.');
        return;
      }

      const submitBtn = document.getElementById('submitReportBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        await db.collection('reportedListings').add({
          listingId: currentListing.id,
          listingTitle: currentListing.title || '',
          listingImage: currentListing.images?.[0] || '',
          sellerId: currentListing.userId || '',
          sellerEmail: currentListing.sellerEmail || '',
          reportedBy: user.uid,
          reason,
          details,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          status: 'pending',
          adminNotes: '',
          reviewedBy: '',
          reviewedAt: null
        });

        alert('Thanks for reporting. Our team will review this listing.');
        closeReportModal();
      } catch (error) {
        console.error('Error submitting report:', error);
        alert('Unable to submit report. Please try again.');
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Report';
        }
      }
    }

    async function startThread() {
      try {
        const user = auth.currentUser;

        if (!user) {
          alert("Please log in to message sellers.");
          window.location.href = 'login.html';
          return;
        }

        if (!currentListing.userId) {
          alert("Seller ID missing on listing");
          return;
        }

        // Check blocking relationships
        const userDoc = await db.collection('users').doc(user.uid).get();
        const sellerDoc = await db.collection('users').doc(currentListing.userId).get();
        
        const userBlockedList = userDoc.data()?.blockedUsers || [];
        const sellerBlockedList = sellerDoc.data()?.blockedUsers || [];

        // Check if user has blocked the seller
        if (userBlockedList.includes(currentListing.userId)) {
          alert('You cannot message this seller because you have blocked them.');
          closeMessageModal();
          return;
        }

        // Check if seller has blocked the user
        if (sellerBlockedList.includes(user.uid)) {
          alert('You cannot message this seller because they have blocked you.');
          closeMessageModal();
          return;
        }

        const initialMessageText = document.getElementById('initialMessage').value.trim();
        const threadsRef = db.collection("threads");

        // Check if thread already exists
        const q = threadsRef
          .where("listingId", "==", currentListing.id)
          .where("buyerId", "==", user.uid);

        const snapshot = await q.get();

        if (!snapshot.empty) {
          const existingThreadId = snapshot.docs[0].id;

          // Backfill lead type for older threads that predate typed leads.
          await db.collection('threads').doc(existingThreadId).set({
            leadType: 'marketplace'
          }, { merge: true });
          
          // If user entered an initial message, send it to existing thread
          if (initialMessageText) {
            await db.collection('threads')
              .doc(existingThreadId)
              .collection('messages')
              .add({
                text: initialMessageText,
                senderId: user.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
            
            await db.collection('threads').doc(existingThreadId).update({
              lastMessage: initialMessageText,
              lastTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
              unreadBy: firebase.firestore.FieldValue.arrayUnion(currentListing.userId) // Mark as unread for seller
            });
          }
          
          closeMessageModal();
          window.location.href = `messages.html?threadId=${existingThreadId}`;
          return;
        }

        // Create new thread
        const threadData = {
          listingId: currentListing.id,
          leadType: 'marketplace',
          buyerId: user.uid,
          sellerId: currentListing.userId,
          participantIds: [user.uid, currentListing.userId],
          listingTitle: currentListing.title,
          listingImage: currentListing.images?.[0] || null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastMessage: initialMessageText || "",
          lastTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
          unreadBy: initialMessageText ? [currentListing.userId] : [], // Seller has unread if message sent
        };

        const docRef = await threadsRef.add(threadData);

        await trackPromotionDailyEvent('marketplace', 'lead', currentListing.userId || currentListing.businessId || '', `lead_marketplace_${promotionId}_${docRef.id}`);
        
        // If user entered an initial message, add it to the thread
        if (initialMessageText) {
          await db.collection('threads')
            .doc(docRef.id)
            .collection('messages')
            .add({
              text: initialMessageText,
              senderId: user.uid,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        
        closeMessageModal();
        window.location.href = `messages.html?threadId=${docRef.id}`;

      } catch (error) {
        console.error(error);
        alert("Unable to start conversation.");
      }
    }

    // Check if listing is saved and update button
    async function checkIfSaved() {
      const saveBtn = document.getElementById('saveListing');
      const user = auth.currentUser;
      if (!user || !saveBtn || !currentListing.id) return;

      try {
        const docRef = db.collection('saveListings').doc(`${user.uid}_${currentListing.id}`);
        const doc = await docRef.get();
        if (!doc.exists) {
          saveBtn.textContent = 'Save Listing';
          saveBtn.classList.remove('saved');
        }
      } catch (error) {
        console.error('Error checking saved status:', error);
      }
    }

    async function saveListing() {
      const saveBtn = document.getElementById('saveListing');
      const user = auth.currentUser;
      if (!user || !currentListing.id) {
        alert('Please sign in to save listings.');
        return;
      }

      try {
        const docId = `${user.uid}_${currentListing.id}`;
        const docRef = db.collection('saveListings').doc(docId);
        const doc = await docRef.get();

        if (doc.exists) {
          // Already saved - show modal
          showAlreadySavedModal();
          return;
        }

        // Save the listing
        await docRef.set({
          listingId: currentListing.id,
          userId: user.uid,
          title: currentListing.title || 'Untitled',
          description: currentListing.description || '',
          image: currentListing.images?.[0] || null,
          sellerName: currentListing.sellerName || '',
          price: currentListing.price || 0,
          city: currentListing.city || 'TBD',
          category: currentListing.category || '',
          savedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        saveBtn.textContent = 'Saved';
        saveBtn.classList.add('saved');
        saveBtn.disabled = true;
        showSaveSuccessModal();
      } catch (error) {
        console.error('Error saving listing:', error);
        alert('Failed to save listing.');
      }
    }

    function showSaveSuccessModal() {
      document.getElementById('saveSuccessModal').classList.add('active');
    }

    function closeSaveModal() {
      document.getElementById('saveSuccessModal').classList.remove('active');
    }

    function showAlreadySavedModal() {
      document.getElementById('alreadySavedModal').classList.add('active');
    }

    function closeAlreadySavedModal() {
      document.getElementById('alreadySavedModal').classList.remove('active');
    }

    function goToSavedListings() {
      window.location.href = 'profile.html#saved';
    }

    // Load listing when page loads
    loadListing();
    setTimeout(checkIfSaved, 1000);
  </script>
</body>
</html>
