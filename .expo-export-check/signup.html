<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Local List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      max-width: 480px;
      margin: 40px auto;
      padding: 20px;
      flex: 1;
    }
    
    .signup-box {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    
    .title {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 8px;
      color: #475569;
    }
    
    .subtitle {
      font-size: 18px;
      text-align: center;
      margin-bottom: 12px;
      color: #333;
    }
    
    .info {
      font-size: 15px;
      text-align: center;
      margin-bottom: 24px;
      color: #555;
      line-height: 1.5;
    }
    
    .google-btn {
      width: 100%;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      color: #475569;
      background: white;
      border: 1px solid #475569;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .google-btn:hover {
      background: #f0f8fc;
    }
    
    .google-btn:active {
      transform: scale(0.98);
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }
    
    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: #e0e0e0;
    }
    
    .divider span {
      background: white;
      padding: 0 16px;
      position: relative;
      color: #666;
      font-size: 14px;
    }
    
    .field {
      margin-bottom: 20px;
    }
    
    .label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    
    .input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      transition: border-color 0.3s;
      font-family: inherit;
    }
    
    .input:focus {
      outline: none;
      border-color: #475569;
    }

    select.input {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 1.2em;
      padding-right: 32px;
    }

    .hidden-field {
      display: none;
    }

    .label-optional {
      font-size: 12px;
      color: #999;
      font-weight: normal;
      margin-left: 4px;
    }
    
    .signup-btn {
      width: 100%;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: #475569;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 12px;
    }
    
    .signup-btn:hover {
      background: #087a9a;
    }
    
    .error-message {
      display: none;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    
    .error-message.show {
      display: block;
    }
    
    .login-link {
      text-align: center;
      margin-top: 24px;
      color: #333;
      font-size: 15px;
    }
    
    .login-link a {
      color: #475569;
      text-decoration: underline;
    }
    
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: auto;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }
      
      .signup-box {
        padding: 24px 20px;
      }
    }
  </style>
  
  <!-- Firebase SDK (Compat for HTML/JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="header-container"></div>
  
  <div class="container">
    <div class="signup-box">
      <h1 class="title">Create Account</h1>
      <p class="subtitle">Harrison's Local Marketplace</p>
      <p class="info">Join Local List to buy, sell, and connect with your community.</p>
      
      <div class="error-message" id="errorMessage"></div>
      
      <button class="google-btn" type="button" onclick="signUpWithGoogle()">
        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Sign up with Google
      </button>
      
      <div class="divider">
        <span>OR</span>
      </div>
      
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="field">
          <label class="label" for="accountType">Account Type</label>
          <select 
            id="accountType" 
            name="accountType" 
            class="input" 
            onchange="toggleBusinessFields()"
            required
          >
            <option value="personal">Personal Account</option>
            <option value="business">Business Account</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="firstName">First Name</label>
          <input 
            type="text" 
            id="firstName" 
            name="firstName" 
            class="input" 
            placeholder="John"
            required
          >
        </div>

        <div class="field">
          <label class="label" for="lastName">Last Name</label>
          <input 
            type="text" 
            id="lastName" 
            name="lastName" 
            class="input" 
            placeholder="Doe"
            required
          >
        </div>

        <div class="field hidden-field" id="businessNameField">
          <label class="label" for="businessName">
            Business Name
            <span class="label-optional">(Business accounts only)</span>
          </label>
          <input 
            type="text" 
            id="businessName" 
            name="businessName" 
            class="input" 
            placeholder="Your Business Name"
          >
        </div>
        
        <div class="field">
          <label class="label" for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="input" 
            placeholder="you@email.com"
            required
          >
        </div>
        
        <div class="field">
          <label class="label" for="zipcode">ZIP Code</label>
          <input 
            type="text" 
            id="zipcode" 
            name="zipcode" 
            class="input" 
            placeholder="12345"
            pattern="[0-9]{5}"
            maxlength="5"
            required
          >
        </div>
        
        <div class="field">
          <label class="label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="input" 
            placeholder="Create a password"
            minlength="6"
            required
          >
        </div>
        
        <div class="field">
          <label class="label" for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            class="input" 
            placeholder="Confirm your password"
            required
          >
        </div>
        
        <button type="submit" class="signup-btn" id="signupBtn">Create Account</button>
      </form>
      
      <div class="login-link">
        Already have an account?<br>
        <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>
  
  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>
  
  <script src="header.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const auth = window.firebaseAuth;
    const db = window.firebaseDb;

    async function isZipCodeApproved(zipCode) {
      const zip = String(zipCode || '').trim();
      if (!/^[0-9]{5}$/.test(zip)) return false;

      const [zipCodeSnap, zipCodesSnap, approvedZipSnap] = await Promise.all([
        db.collection('zipCode').where('zip', '==', zip).get(),
        db.collection('zipCodes').where('zip', '==', zip).get(),
        db.collection('approved_zips').where('zip', '==', zip).get()
      ]);

      return !zipCodeSnap.empty || !zipCodesSnap.empty || !approvedZipSnap.empty;
    }

    function signUpWithGoogle() {
      const accountType = document.getElementById('accountType').value;
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const businessName = document.getElementById('businessName').value.trim();
      const zipCode = document.getElementById('zipcode').value.trim();

      if (!firstName || !lastName) {
        showError('Please enter your first and last name before using Google sign-up.');
        return;
      }

      if (!/^[0-9]{5}$/.test(zipCode)) {
        showError('Please enter a valid 5-digit ZIP code before using Google sign-up.');
        return;
      }

      if (accountType === 'business' && !businessName) {
        showError('Please enter your business name.');
        return;
      }

      const provider = new firebase.auth.GoogleAuthProvider();
      // Force the account picker so the Google prompt is always visible
      provider.setCustomParameters({ prompt: 'select_account' });
      auth.signInWithPopup(provider)
        .then(async (result) => {
          const user = result.user;
          const displayName = `${firstName} ${lastName}`.trim() || user.displayName || user.email.split('@')[0];
          const zipApproved = await isZipCodeApproved(zipCode);
          // Create user document if it doesn't exist
          const userDoc = {
            email: user.email,
            accountType: accountType,
            role: 'user',
            status: zipApproved ? 'approved' : 'pending',
            isDisabled: false,
            isBanned: false,
            zipApproved: zipApproved,
            zipCode: zipCode,
            createdAt: new Date(),
            blockedUsers: [],
            displayName: displayName,
            name: displayName
          };

          if (accountType === 'business') {
            userDoc.businessName = businessName;
            userDoc.businessDescription = null;
            userDoc.businessPhone = null;
            userDoc.businessWebsite = null;
            userDoc.subscriptionPlan = 'free';
            userDoc.subscriptionStatus = 'active';
            userDoc.subscriptionStartedAt = new Date();
            userDoc.subscriptionExpiresAt = null;
          }

          db.collection('users').doc(user.uid).set(userDoc, { merge: true })
          .then(async () => {
            if (!zipApproved) {
              await db.collection('pendingApprovals').doc(user.uid).set({
                userId: user.uid,
                name: displayName,
                email: user.email,
                zipCode: zipCode,
                requestedAt: new Date(),
                status: 'pending'
              }, { merge: true });
            }
            handleAuthSuccess(user);
          });
        })
          .catch((error) => {
            console.error('Google sign-in error:', error);
            if (error.code === 'auth/popup-closed-by-user') {
              window.location.href = 'login.html';
            } else if (error.code === 'auth/cancelled-popup-request') {
              window.location.href = 'login.html';
            } else {
              showError('Google Sign-Up failed. Please try again.');
            }
          });
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
      
      setTimeout(() => {
        errorDiv.classList.remove('show');
      }, 5000);
    }

    function getErrorMessage(error) {
      switch(error.code) {
        case 'auth/email-already-in-use':
        case 'auth/account-exists-with-different-credential':
          return 'Account already exists. Please log in instead.';
        case 'auth/invalid-email':
          return 'Invalid email address';
        case 'auth/weak-password':
          return 'Password is too weak. Please use at least 6 characters';
        case 'auth/operation-not-allowed':
          return 'Account creation is currently disabled';
        case 'auth/too-many-requests':
          return 'Too many signup attempts. Please try again later';
        default:
          return error.message || 'Signup failed. Please try again';
      }
    }

    function toggleBusinessFields() {
      const accountType = document.getElementById('accountType').value;
      const businessNameField = document.getElementById('businessNameField');
      const businessNameInput = document.getElementById('businessName');
      
      if (accountType === 'business') {
        businessNameField.classList.remove('hidden-field');
        businessNameInput.required = true;
      } else {
        businessNameField.classList.add('hidden-field');
        businessNameInput.required = false;
        businessNameInput.value = '';
      }
    }

    async function handleAuthSuccess(user) {
      try {
        // Get user's role from Firestore (default to 'user')
        const userDoc = await db.collection('users').doc(user.uid).get();
        const isAdmin = userDoc.exists && userDoc.data().role === 'admin';
        
        // Store user info in localStorage
        localStorage.setItem('userToken', user.uid);
        localStorage.setItem('userName', user.email);
        localStorage.setItem('isAdmin', isAdmin ? 'true' : 'false');
        
        // Redirect to home page
        window.location.href = 'index.html';
      } catch (error) {
        showError('Error setting up account: ' + error.message);
      }
    }

    function handleSignup(event) {
      event.preventDefault();
      
      const accountType = document.getElementById('accountType').value;
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const businessName = document.getElementById('businessName').value.trim();
      const zipCode = document.getElementById('zipcode').value.trim();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const signupBtn = document.getElementById('signupBtn');
      
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      if (accountType === 'business' && !businessName) {
        showError('Please enter your business name');
        return;
      }

      if (!/^[0-9]{5}$/.test(zipCode)) {
        showError('Please enter a valid 5-digit ZIP code');
        return;
      }
      
      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating Account...';
      
      // Sign up with Firebase
      auth.createUserWithEmailAndPassword(email, password)
        .then(async (userCredential) => {
          const fullName = `${firstName} ${lastName}`.trim();
          const zipApproved = await isZipCodeApproved(zipCode);

          // Send email verification
          await userCredential.user.sendEmailVerification({
            url: 'https://app.locallist.biz/verify-email.html?isNewUser=true'
          });

          const userDoc = {
            email: email,
            accountType: accountType,
            role: 'user',
            status: zipApproved ? 'approved' : 'pending',
            isDisabled: false,
            isBanned: false,
            zipApproved: zipApproved,
            zipCode: zipCode,
            createdAt: new Date(),
            digestNotification: true,
            listingUpNotification: true,
            messageNotification: true,
            phone: '',
            blockedUsers: [],
            displayName: fullName,
            name: fullName
          };

          if (accountType === 'business') {
            userDoc.businessName = businessName;
            userDoc.businessDescription = null;
            userDoc.businessPhone = null;
            userDoc.businessWebsite = null;
            userDoc.subscriptionPlan = 'free';
            userDoc.subscriptionStatus = 'active';
            userDoc.subscriptionStartedAt = new Date();
            userDoc.subscriptionExpiresAt = null;
          }

          await db.collection('users').doc(userCredential.user.uid).set(userDoc, { merge: true });

          if (!zipApproved) {
            await db.collection('pendingApprovals').doc(userCredential.user.uid).set({
              userId: userCredential.user.uid,
              name: fullName,
              email: email,
              zipCode: zipCode,
              requestedAt: new Date(),
              status: 'pending'
            }, { merge: true });
          }

          alert('Account created! A verification email has been sent to ' + email + '.');
          handleAuthSuccess(userCredential.user);
        })
        .catch((error) => {
          signupBtn.disabled = false;
          signupBtn.textContent = 'Create Account';
          showError(getErrorMessage(error));
        });
    }
  </script>
</body>
</html>
