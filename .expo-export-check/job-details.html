<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Details - Local List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f3f5f7;
      color: #1f2937;
      min-height: 100vh;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 22px 14px 34px;
    }
    .back-row {
      margin-bottom: 12px;
    }
    .back-row a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .title { font-size: 28px; font-weight: 800; margin-bottom: 6px; color: #111827; }
    .company { font-size: 15px; color: #475569; margin-bottom: 10px; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .pill {
      background: #e2e8f0;
      color: #334155;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .label { font-size: 13px; font-weight: 700; color: #0f172a; margin-top: 10px; margin-bottom: 6px; }
    .text { font-size: 14px; line-height: 1.45; color: #334155; }
    .info { font-size: 14px; color: #475569; margin-bottom: 6px; }
    .apply-button {
      display: inline-block;
      margin-top: 12px;
      background: #0f766e;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
    }
    .empty {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #64748b;
    }
    footer {
      margin-top: 24px;
      background: #333;
      color: #fff;
      text-align: center;
      padding: 18px;
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="container">
    <div class="back-row">
      <a href="job-listings.html">← Back to Job Board</a>
    </div>

    <div id="jobContainer"></div>
  </main>

  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>

  <script src="header.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = window.firebaseDb;
    const jobContainer = document.getElementById('jobContainer');
    const params = new URLSearchParams(window.location.search);
    const jobViewId = params.get('id');
    const promotionId = params.get('promo');
    const jobViewSessionKey = jobViewId ? `job_viewed_${jobViewId}` : null;
    const promotionStatsSession = new Set();

    function getTodayDateKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    async function trackDailyViewEvent(entityType, entityId, businessId) {
      if (!entityType || !entityId || !businessId) return;

      const dateKey = getTodayDateKey();
      const metricDocId = `${entityType}_${entityId}_${dateKey}`;
      try {
        await db.collection('analyticsDailyViews').doc(metricDocId).set({
          entityType,
          entityId,
          businessId,
          dateKey,
          viewCount: firebase.firestore.FieldValue.increment(1),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
      } catch (error) {
        console.warn('Could not track daily job view analytics:', error);
      }
    }

    async function trackPromotionDailyEvent(sourceType, eventType, businessId, dedupeKey) {
      if (!promotionId || !sourceType || !eventType || !businessId) return;
      if (dedupeKey && promotionStatsSession.has(dedupeKey)) return;

      const dateKey = getTodayDateKey();
      const metricDocId = `${promotionId}_${dateKey}`;
      try {
        await db.collection('promotionDailyStats').doc(metricDocId).set({
          promotionId,
          businessId,
          sourceType,
          dateKey,
          impressions: eventType === 'impression' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0),
          clicks: eventType === 'click' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0),
          leads: eventType === 'lead' ? firebase.firestore.FieldValue.increment(1) : firebase.firestore.FieldValue.increment(0),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
        if (dedupeKey) promotionStatsSession.add(dedupeKey);
      } catch (error) {
        console.warn('Could not track promotion job event:', error);
      }
    }

    function escapeHtml(value) {
      const text = value == null ? '' : String(value);
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderNotFound() {
      jobContainer.innerHTML = '<div class="empty">Job not found.</div>';
    }

    function formatDate(createdAt) {
      if (!createdAt) return '';
      if (createdAt.toDate) {
        return createdAt.toDate().toLocaleDateString();
      }
      return '';
    }

    function renderJob(job) {
      const payMin = Number(job.payMin || 0);
      const payMax = Number(job.payMax || 0);
      const payRange = Number.isFinite(payMin) && Number.isFinite(payMax)
        ? `$${payMin.toLocaleString()} - $${payMax.toLocaleString()}`
        : 'Pay not specified';
      const postedDate = formatDate(job.createdAt);
      const applyTarget = resolveApplyTarget(job.howApply, job.contactEmail, job.jobTitle);

      jobContainer.innerHTML = `
        <article class="card">
          <h1 class="title">${escapeHtml(job.jobTitle || 'Untitled Role')}</h1>
          <div class="company">${escapeHtml(job.companyName || 'Company not specified')}</div>
          <div class="meta">
            <span class="pill">${escapeHtml(job.jobCategory || 'Uncategorized')}</span>
            <span class="pill">${escapeHtml(job.jobType || 'Type not set')}</span>
          </div>

          <div class="label">Description</div>
          <p class="text">${escapeHtml(job.jobDescription || 'No description provided.')}</p>

          <div class="label">Details</div>
          <div class="info"><strong>Location:</strong> ${escapeHtml(job.jobLocation || 'N/A')}</div>
          <div class="info"><strong>Pay:</strong> ${escapeHtml(payRange)}</div>
          <div class="info"><strong>How To Apply:</strong> ${escapeHtml(job.howApply || 'N/A')}</div>
          <div class="info"><strong>Contact:</strong> ${escapeHtml(job.contactEmail || 'N/A')}</div>
          <div class="info"><strong>Posted By:</strong> ${escapeHtml(job.userName || 'Unknown')}</div>
          ${postedDate ? `<div class="info"><strong>Posted On:</strong> ${escapeHtml(postedDate)}</div>` : ''}
          ${applyTarget ? `<a class="apply-button" href="${escapeHtml(applyTarget)}" target="_blank" rel="noopener noreferrer">Apply Now</a>` : ''}
        </article>
      `;
    }

    function resolveApplyTarget(howApply, contactEmail, jobTitle) {
      const howApplyText = (howApply || '').trim();
      const contactText = (contactEmail || '').trim();

      const emailRegex = /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i;
      const howApplyEmail = howApplyText.match(emailRegex);
      const contactEmailMatch = contactText.match(emailRegex);

      if (howApplyEmail) {
        const subject = encodeURIComponent(`Application: ${jobTitle || 'Job Opening'}`);
        return `mailto:${howApplyEmail[0]}?subject=${subject}`;
      }

      if (/^https?:\/\//i.test(howApplyText)) {
        return howApplyText;
      }

      if (/^www\./i.test(howApplyText)) {
        return `https://${howApplyText}`;
      }

      if (contactEmailMatch) {
        const subject = encodeURIComponent(`Application: ${jobTitle || 'Job Opening'}`);
        return `mailto:${contactEmailMatch[0]}?subject=${subject}`;
      }

      return null;
    }

    async function incrementJobViewCount(jobId, jobData) {
      if (!jobId || !jobViewSessionKey) return;
      if (sessionStorage.getItem(jobViewSessionKey) === '1') return;

      try {
        await db.collection('jobBoard').doc(jobId).update({
          viewCount: firebase.firestore.FieldValue.increment(1)
        });
        const businessId = jobData?.businessId || jobData?.userId || null;
        if (businessId) {
          await trackDailyViewEvent('job', jobId, businessId);
        }
        sessionStorage.setItem(jobViewSessionKey, '1');
      } catch (error) {
        console.warn('Could not increment job view count:', error, jobData?.jobId || jobId);
      }
    }

    async function loadJob() {
      const id = jobViewId;
      if (!id) {
        renderNotFound();
        return;
      }

      try {
        const snap = await db.collection('jobBoard').doc(id).get();
        if (!snap.exists) {
          renderNotFound();
          return;
        }

        const jobData = snap.data() || {};
        await incrementJobViewCount(id, jobData);
        await trackPromotionDailyEvent('job', 'click', jobData.userId || jobData.businessId || '', `click_job_${promotionId}_${id}`);
        renderJob(jobData);
      } catch (error) {
        console.error('Failed to load job:', error);
        renderNotFound();
      }
    }

    loadJob();
  </script>
</body>
</html>
