<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Local List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      max-width: 480px;
      margin: 40px auto;
      padding: 20px;
      flex: 1;
    }
    
    .reset-box {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    
    .title {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 16px;
      color: #475569;
    }
    
    .info {
      font-size: 15px;
      text-align: center;
      margin-bottom: 32px;
      color: #555;
      line-height: 1.5;
    }
    
    .field {
      margin-bottom: 20px;
    }
    
    .label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    
    .input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      transition: border-color 0.3s;
      font-family: inherit;
    }
    
    .input:focus {
      outline: none;
      border-color: #475569;
    }
    
    .reset-btn {
      width: 100%;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: #475569;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 12px;
    }
    
    .reset-btn:hover {
      background: #087a9a;
    }
    
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    
    .back-link a {
      color: #475569;
      text-decoration: underline;
      font-size: 15px;
    }
    
    .success-message {
      display: none;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .success-message.show {
      display: block;
    }
    
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: auto;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }
      
      .reset-box {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  
  <div class="container">
    <div class="reset-box">
      <h1 class="title">Reset Password</h1>
      <p class="info">Enter your email address and we'll send you instructions to reset your password.</p>
      
      <div class="success-message" id="successMessage">
        Password reset email sent! Check your inbox for instructions.
      </div>
      
      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="field">
          <label class="label" for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="input" 
            placeholder="you@email.com"
            required
          >
        </div>
        
        <button type="submit" class="reset-btn" id="resetBtn">Send Reset Link</button>
      </form>
      
      <div class="back-link">
        <a href="login.html">Back to Sign In</a>
      </div>
    </div>
  </div>
  
  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>
  
  <script src="header.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const auth = window.firebaseAuth;
    
    async function handleReset(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const resetBtn = document.getElementById('resetBtn');
      const successMsg = document.getElementById('successMessage');
      
      if (!email) {
        alert('Please enter your email address');
        return;
      }
      
      resetBtn.disabled = true;
      resetBtn.textContent = 'Sending...';
      
      try {
        // Send password reset email using Firebase
        await auth.sendPasswordResetEmail(email, {
          url: 'https://app.locallist.biz/auth-action.html',
          handleCodeInApp: false
        });
        
        // Show success message
        successMsg.classList.add('show');
        document.getElementById('resetForm').reset();
        
        // Optionally redirect after a delay
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 3000);
        
      } catch (error) {
        console.error('Password reset error:', error);
        
        let errorMessage = 'Failed to send reset email. Please try again.';
        
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = 'No account found with this email address.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Invalid email address.';
            break;
          case 'auth/too-many-requests':
            errorMessage = 'Too many attempts. Please try again later.';
            break;
        }
        
        alert(errorMessage);
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Send Reset Link';
      }
    }
  </script>
</body>
</html>
