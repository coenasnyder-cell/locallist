<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-533FSPH8JT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-533FSPH8JT');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details - Local List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      min-height: 100vh;
    }

    .back-row {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 14px;
    }

    .back-row-inner {
      max-width: 980px;
      margin: 0 auto;
    }

    .back-link {
      color: #1e3a5f;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 14px 34px;
    }

    .event-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .event-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      display: none;
      background: #e2e8f0;
    }

    .event-content {
      padding: 18px;
    }

    .event-title {
      font-size: 30px;
      line-height: 1.2;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
    }

    .meta-label {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .meta-value {
      color: #0f172a;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
    }

    .description-title {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .description {
      color: #334155;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-family: inherit;
    }

    .btn-primary {
      background: #1e3a5f;
      color: #fff;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1f2937;
    }

    .status {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      color: #475569;
      font-size: 14px;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 24px;
    }

    @media (max-width: 760px) {
      .event-title {
        font-size: 25px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 14px 10px 30px;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <section class="back-row" aria-label="Back navigation">
    <div class="back-row-inner">
      <a class="back-link" href="events.html">← Back to Events</a>
    </div>
  </section>

  <main class="container">
    <div id="loadingState" class="status">Loading event details...</div>

    <article id="eventCard" class="event-card" style="display:none;">
      <img id="eventImage" class="event-image" alt="Event image">

      <div class="event-content">
        <h1 id="eventTitle" class="event-title">Untitled Event</h1>

        <div class="meta-grid">
          <div class="meta-item">
            <span class="meta-label">Date</span>
            <span id="eventDate" class="meta-value">TBD</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Time</span>
            <span id="eventTime" class="meta-value">TBD</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Location</span>
            <span id="eventLocation" class="meta-value">TBD</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Ticket Price</span>
            <span id="ticketPrice" class="meta-value">TBD</span>
          </div>
        </div>

        <h2 class="description-title">About This Event</h2>
        <p id="eventDescription" class="description">No description provided.</p>

        <div class="actions">
          <button id="calendarBtn" type="button" class="btn btn-primary">Add to Calendar</button>
          <a id="websiteBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener" style="display:none;">Visit Event Website</a>
        </div>
      </div>
    </article>

    <div id="errorState" class="status" style="display:none;">
      Event details are unavailable. This event may have been removed.
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>

  <script src="header.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = window.firebaseDb;
    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const eventCard = document.getElementById('eventCard');
    const calendarBtn = document.getElementById('calendarBtn');

    let currentEvent = null;

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function normalizeDate(value) {
      if (!value) return null;
      if (value instanceof Date) return value;
      if (value.toDate && typeof value.toDate === 'function') return value.toDate();
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDate(value) {
      const date = normalizeDate(value);
      if (!date) return 'Date TBD';
      return date.toLocaleDateString(undefined, {
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        year: 'numeric',
      });
    }

    function parseEventDateTime(eventData, timeValue) {
      const date = normalizeDate(eventData.eventDate);
      if (!date) return null;

      const result = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0);
      if (!timeValue) return result;

      const parts = String(timeValue).split(':');
      if (parts.length >= 2) {
        const h = Number.parseInt(parts[0], 10);
        const m = Number.parseInt(parts[1], 10);
        if (!Number.isNaN(h) && !Number.isNaN(m)) {
          result.setHours(h, m, 0, 0);
        }
      }

      return result;
    }

    function formatIcsDate(date) {
      const year = date.getUTCFullYear();
      const month = String(date.getUTCMonth() + 1).padStart(2, '0');
      const day = String(date.getUTCDate()).padStart(2, '0');
      const hours = String(date.getUTCHours()).padStart(2, '0');
      const minutes = String(date.getUTCMinutes()).padStart(2, '0');
      const seconds = String(date.getUTCSeconds()).padStart(2, '0');
      return `${year}${month}${day}T${hours}${minutes}${seconds}Z`;
    }

    function buildIcsContent(eventData) {
      const start = parseEventDateTime(eventData, eventData.eventStarttime);
      if (!start) return null;

      const end = parseEventDateTime(eventData, eventData.eventEndtime) || new Date(start.getTime() + 60 * 60 * 1000);
      if (end <= start) {
        end.setTime(start.getTime() + 60 * 60 * 1000);
      }

      const title = String(eventData.eventTitle || 'Local List Event').replace(/\n/g, ' ').replace(/,/g, '\\,').replace(/;/g, '\\;');
      const description = String(eventData.eventDescription || '').replace(/\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
      const location = `${eventData.eventAdress || ''} ${eventData.eventCity || ''} ${eventData.eventState || ''} ${eventData.eventZipcode || ''}`
        .trim()
        .replace(/\n/g, ' ')
        .replace(/,/g, '\\,')
        .replace(/;/g, '\\;');

      return [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Local List//Events//EN',
        'CALSCALE:GREGORIAN',
        'BEGIN:VEVENT',
        `UID:${Date.now()}-${Math.random().toString(36).slice(2)}@locallist.biz`,
        `DTSTAMP:${formatIcsDate(new Date())}`,
        `DTSTART:${formatIcsDate(start)}`,
        `DTEND:${formatIcsDate(end)}`,
        `SUMMARY:${title}`,
        `DESCRIPTION:${description}`,
        `LOCATION:${location}`,
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');
    }

    function downloadCalendarFile(eventData) {
      const icsContent = buildIcsContent(eventData);
      if (!icsContent) {
        alert('This event needs a valid date before it can be added to calendar.');
        return;
      }

      const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
      const link = document.createElement('a');
      const safeTitle = String(eventData.eventTitle || 'event').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

      link.href = URL.createObjectURL(blob);
      link.download = `${safeTitle || 'event'}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function setText(id, value, fallback) {
      document.getElementById(id).textContent = value || fallback;
    }

    function renderEvent(eventData) {
      currentEvent = eventData;

      setText('eventTitle', eventData.eventTitle, 'Untitled Event');
      setText('eventDate', formatDate(eventData.eventDate), 'Date TBD');

      const timeText = eventData.eventStarttime
        ? `${eventData.eventStarttime}${eventData.eventEndtime ? ` - ${eventData.eventEndtime}` : ''}`
        : 'Time TBD';
      setText('eventTime', timeText, 'Time TBD');

      const locationText = [eventData.eventAdress, eventData.eventCity, eventData.eventState, eventData.eventZipcode]
        .filter(Boolean)
        .join(', ');
      setText('eventLocation', locationText, 'Location TBD');

      setText('ticketPrice', eventData.ticketPrice || 'Free', 'Free');
      setText('eventDescription', eventData.eventDescription || 'No description provided.', 'No description provided.');

      const imageEl = document.getElementById('eventImage');
      if (eventData.eventImage) {
        imageEl.src = eventData.eventImage;
        imageEl.style.display = 'block';
      } else {
        imageEl.style.display = 'none';
      }

      const websiteBtn = document.getElementById('websiteBtn');
      if (eventData.eventWebsite) {
        websiteBtn.href = eventData.eventWebsite;
        websiteBtn.style.display = 'inline-block';
      } else {
        websiteBtn.style.display = 'none';
      }

      loadingState.style.display = 'none';
      errorState.style.display = 'none';
      eventCard.style.display = 'block';
    }

    async function loadEvent() {
      const eventId = getQueryParam('eventId');
      const payload = getQueryParam('payload');

      if (eventId && db) {
        try {
          const doc = await db.collection('events').doc(eventId).get();
          if (doc.exists) {
            renderEvent(doc.data() || {});
            return;
          }
        } catch (error) {
          console.error('Failed to load event by id:', error);
        }
      }

      if (payload) {
        try {
          const parsed = JSON.parse(decodeURIComponent(payload));
          renderEvent(parsed || {});
          return;
        } catch (error) {
          console.error('Failed to parse payload event:', error);
        }
      }

      loadingState.style.display = 'none';
      eventCard.style.display = 'none';
      errorState.style.display = 'block';
    }

    calendarBtn.addEventListener('click', () => {
      if (!currentEvent) {
        alert('Event data is not available yet.');
        return;
      }
      downloadCalendarFile(currentEvent);
    });

    loadEvent();
  </script>
</body>
</html>
