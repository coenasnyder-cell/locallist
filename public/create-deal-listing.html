<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-533FSPH8JT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-533FSPH8JT');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Deal - Local List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 14px 40px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      padding: 22px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
      color: #111827;
    }

    .subtitle {
      color: #4b5563;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }

    input,
    textarea,
    select {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-family: inherit;
      background: #fff;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #d97706;
      box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-row input {
      width: 17px;
      height: 17px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: #d97706;
      color: #fff;
    }

    .btn.primary:hover {
      background: #b45309;
    }

    .btn.secondary {
      background: #eef2f7;
      color: #374151;
    }

    .message {
      margin-top: 14px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      border: 1px solid #86efac;
      color: #166534;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .hidden {
      display: none;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 24px;
    }

    @media (max-width: 760px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="header-container"></div>

  <main class="container">
    <section class="panel" aria-label="Create a deal form">
      <h1>Create A Deal</h1>
      <p class="subtitle">Post deals for businesses, service providers, and admin campaigns. This form writes directly to your <strong>deals</strong> collection.</p>

      <div id="premiumGate" class="message error hidden" role="status" aria-live="polite">
        Premium business account required. Deal posting is available for Premium business members only.
        <div class="actions" style="margin-top:12px;">
          <button class="btn primary" type="button" onclick="window.location.href='profile.html'">Upgrade to Premium</button>
          <button class="btn secondary" type="button" onclick="window.location.href='promotion-center.html'">Back to Post &amp; Promote</button>
        </div>
      </div>

      <form id="dealForm">
        <div class="form-grid">
          <div class="field full">
            <label for="dealsTitle">Deal Title</label>
            <input id="dealsTitle" name="dealsTitle" type="text" maxlength="120" required>
          </div>

          <div class="field full">
            <label for="dealsDescription">Deal Description</label>
            <textarea id="dealsDescription" name="dealsDescription" maxlength="1500" required></textarea>
          </div>

          <div class="field">
            <label for="dealsCategory">Deal Category</label>
            <select id="dealsCategory" name="dealsCategory" required>
              <option value="">Select category</option>
              <option value="Business Deal">Business Deal</option>
              <option value="Service Provider">Service Provider</option>
              <option value="Admin Deal">Admin Deal</option>
            </select>
          </div>

          <div class="field">
            <label for="dealsStartdate">Start Date</label>
            <input id="dealsStartdate" name="dealsStartdate" type="date" required>
          </div>

          <div class="field">
            <label for="dealsEnddate">End Date</label>
            <input id="dealsEnddate" name="dealsEnddate" type="date" required>
          </div>

          <div class="field full" id="featuredRow" style="display:none">
            <label class="checkbox-row" for="dealsisFeatured">
              <input id="dealsisFeatured" name="dealsisFeatured" type="checkbox">
              Mark as featured deal
            </label>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="submitBtn" type="submit">Post Deal</button>
          <button class="btn secondary" id="backBtn" type="button">Back</button>
        </div>

        <div id="formMessage" class="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>

  <script src="header.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = window.firebaseDb;
    const auth = window.firebaseAuth;
    const firebase = window.firebase;
    let isAdminUser = localStorage.getItem('isAdmin') === 'true';

    const dealForm = document.getElementById('dealForm');
    const formMessage = document.getElementById('formMessage');
    const submitBtn = document.getElementById('submitBtn');
    const backBtn = document.getElementById('backBtn');
    const dealsCategorySelect = document.getElementById('dealsCategory');

    function setMessage(type, text) {
      formMessage.className = `message ${type}`;
      formMessage.textContent = text;
    }

    function hasPremiumDealPostingAccess(profileData) {
      const planAccess = window.LocalListPlanAccess || {};
      const isBusiness = (planAccess.resolveAccountType ? planAccess.resolveAccountType(profileData) : String(profileData?.accountType || '').toLowerCase()) === 'business';
      return isAdminUser || (isBusiness && planAccess.hasBusinessPremiumAccess && planAccess.hasBusinessPremiumAccess(profileData));
    }

    function updateAccessState(profileData) {
      const premiumGate = document.getElementById('premiumGate');
      if (hasPremiumDealPostingAccess(profileData)) {
        premiumGate.classList.add('hidden');
        dealForm.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Post Deal';
        return;
      }

      premiumGate.classList.remove('hidden');
      dealForm.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Premium Required';
    }

    function toFirestoreTimestamp(dateValue) {
      if (!dateValue) return null;
      const date = new Date(`${dateValue}T00:00:00`);
      if (Number.isNaN(date.getTime())) return null;
      return firebase.firestore.Timestamp.fromDate(date);
    }

    function getPreviousInternalPage() {
      if (!document.referrer) return null;

      try {
        const refUrl = new URL(document.referrer);
        if (refUrl.origin !== window.location.origin) return null;
        if (refUrl.pathname.endsWith('/create-deal-listing.html')) return null;
        return `${refUrl.pathname}${refUrl.search}${refUrl.hash}`;
      } catch (error) {
        return null;
      }
    }

    function navigateBack() {
      const previousPage = getPreviousInternalPage();
      if (previousPage) {
        window.location.href = previousPage;
        return;
      }

      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = 'deals.html';
    }

    backBtn.addEventListener('click', navigateBack);

    function updateAdminDealOptionVisibility() {
      const adminOption = Array.from(dealsCategorySelect.options).find((option) => option.value === 'Admin Deal');
      const featuredRow = document.getElementById('featuredRow');

      if (isAdminUser) {
        if (adminOption) {
          adminOption.hidden = false;
          adminOption.disabled = false;
        }
        if (featuredRow) featuredRow.style.display = '';
      } else {
        if (adminOption) {
          if (dealsCategorySelect.value === 'Admin Deal') {
            dealsCategorySelect.value = '';
          }
          adminOption.hidden = true;
          adminOption.disabled = true;
        }
        if (featuredRow) {
          featuredRow.style.display = 'none';
          document.getElementById('dealsisFeatured').checked = false;
        }
      }
    }

    async function detectAdminStatus() {
      if (!auth || !db) {
        updateAdminDealOptionVisibility();
        return;
      }

      auth.onAuthStateChanged(async (user) => {
        try {
          if (!user) {
            isAdminUser = localStorage.getItem('isAdmin') === 'true';
            updateAdminDealOptionVisibility();
            return;
          }

          const userDoc = await db.collection('users').doc(user.uid).get();
          const data = userDoc.exists ? (userDoc.data() || {}) : {};
          const isRoleAdmin = String(data.role || '').toLowerCase() === 'admin';
          const isLocalAdmin = localStorage.getItem('isAdmin') === 'true';
          isAdminUser = isRoleAdmin || isLocalAdmin;
          updateAdminDealOptionVisibility();
          updateAccessState(data);
        } catch (error) {
          console.error('Could not verify admin status:', error);
          isAdminUser = localStorage.getItem('isAdmin') === 'true';
          updateAdminDealOptionVisibility();
          updateAccessState({});
        }
      });
    }

    updateAdminDealOptionVisibility();
    detectAdminStatus();

    dealForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!db || !firebase || !firebase.firestore) {
        setMessage('error', 'Firestore is not initialized. Please refresh and try again.');
        return;
      }

      const currentUserData = auth && auth.currentUser
        ? ((await db.collection('users').doc(auth.currentUser.uid).get()).data() || {})
        : {};

      if (!hasPremiumDealPostingAccess(currentUserData)) {
        setMessage('error', 'Premium business account required. Upgrade to Premium to post deals.');
        return;
      }

      const title = String(document.getElementById('dealsTitle').value || '').trim();
      const description = String(document.getElementById('dealsDescription').value || '').trim();
      const category = document.getElementById('dealsCategory').value;
      const startDateInput = document.getElementById('dealsStartdate').value;
      const endDateInput = document.getElementById('dealsEnddate').value;
      const isFeatured = document.getElementById('dealsisFeatured').checked;

      const startDate = toFirestoreTimestamp(startDateInput);
      const endDate = toFirestoreTimestamp(endDateInput);

      if (category === 'Admin Deal' && !isAdminUser) {
        setMessage('error', 'Only admin users can post Admin Deal entries.');
        return;
      }

      if (!title || !description || !category || !startDate || !endDate) {
        setMessage('error', 'Please complete all required fields.');
        return;
      }

      if (startDate.toMillis() > endDate.toMillis()) {
        setMessage('error', 'End date must be the same as or later than start date.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Posting...';

      try {
        const currentUser = auth && auth.currentUser ? auth.currentUser : null;

        await db.collection('deals').add({
          userId: currentUser ? currentUser.uid : '',
          businessId: currentUser ? currentUser.uid : '',
          title: title,
          dealTitle: title,
          dealsTitle: title,
          description: description,
          dealDescription: description,
          dealsDescription: description,
          category: category,
          dealCategory: category,
          dealsCategory: category,
          status: 'pending',
          dealsStatus: 'pending',
          approvalStatus: 'pending',
          isApproved: false,
          startDate: startDate,
          endDate: endDate,
          dealsStartdate: startDate,
          dealsEnddate: endDate,
          isFeatured: isFeatured,
          dealsisFeatured: isFeatured,
          dealsClicks: 0,
          dealsViews: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        setMessage('success', 'Deal submitted for approval. It will appear once reviewed. Redirecting...');
        dealForm.reset();

        setTimeout(() => {
          window.location.href = 'deals.html';
        }, 900);
      } catch (error) {
        console.error('Error creating deal:', error);
        setMessage('error', 'Could not post the deal. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Post Deal';
      }
    });
  </script>
</body>
</html>
