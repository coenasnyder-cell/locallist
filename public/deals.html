<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-533FSPH8JT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals - Local List</title>
  <!-- Firebase SDK (Compat for HTML/JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #e5e7eb;
      --brand: #d97706;
      --brand-dark: #b45309;
      --highlight: #fef3c7;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% -20%, #fde68a 0%, transparent 35%),
        radial-gradient(circle at 90% 0%, #f9a8d4 0%, transparent 28%),
        var(--bg);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .hero {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      height: 140px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.4);
      margin-bottom: 22px;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(17, 24, 39, 0.78), rgba(17, 24, 39, 0.42));
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .hero-copy {
      max-width: 680px;
      color: #ffffff;
      text-align: center;
      margin: 0 auto;
    }

    .hero-copy h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 4px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .hero-copy p {
      font-size: 16px;
      line-height: 1.5;
      color: #f8fafc;
      font-weight: 500;
    }

    .layout {
      display: block;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      text-align: left;
    }

    .panel h2 {
      font-size: 20px;
      margin-bottom: 8px;
      text-align: center;
    }

    .panel p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .deal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .deal-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px 16px;
      background: #fff;
      text-align: left;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .deal-card:hover {
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.1);
      transform: translateY(-2px);
    }

    .deal-card.featured {
      border: 2px solid #ca8a04;
      background: linear-gradient(180deg, #fffbeb 0%, #ffffff 48%);
      box-shadow: 0 6px 22px rgba(202, 138, 4, 0.18);
    }

    .deal-card-thumb-wrap {
      border-radius: 12px;
      overflow: hidden;
      background: #f9fafb;
      border: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .deal-card-thumb {
      width: 100%;
      height: 140px;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .deal-card-header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .urgency {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .urgency--today {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .urgency--soon {
      background: #fef9c3;
      color: #a16207;
      border: 1px solid #fde047;
    }

    .deal-card h3 {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
      text-align: center;
      line-height: 1.3;
      color: #0f172a;
    }

    .deal-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0;
      justify-content: center;
      align-items: center;
    }

    .meta-chip {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      background: #eef2ff;
      color: #3730a3;
    }

    .meta-chip--featured {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      border: 1px solid #fbbf24;
    }

    .meta-chip--service {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #6ee7b7;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .deal-card .deal-desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
      flex-grow: 1;
    }

    .deal-dates {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .expires {
      font-size: 14px;
      color: #6b7280;
      font-weight: 600;
    }

    .deal-view-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: var(--brand);
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .deal-view-btn:hover {
      background: var(--brand-dark);
      color: #fff;
    }

    .loading,
    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      background: #fffbeb;
      grid-column: 1 / -1;
    }

    .cta {
      display: inline-flex;
      margin-top: 6px;
      text-decoration: none;
      color: #ffffff;
      background: var(--brand);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s ease;
    }

    .cta:hover {
      background: var(--brand-dark);
    }

    footer {
      margin-top: 26px;
      background: #333;
      color: #ffffff;
      text-align: center;
      padding: 18px;
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero-copy h1 {
        font-size: 24px;
      }
    }

    @media (max-width: 640px) {
      .page-wrap {
        padding: 14px 10px 30px;
      }

      .hero {
        height: 110px;
      }

      .hero img {
        height: 100%;
      }

      .hero-overlay {
        padding: 12px;
      }

      .hero-copy h1 {
        font-size: 20px;
      }

      .hero-copy p {
        font-size: 16px;
      }

      .deal-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="page-wrap">
    <section class="hero" aria-label="Deals highlight banner">
      <img src="communityhub.png" alt="Shoppers and local businesses in the community">
      <div class="hero-overlay">
        <div class="hero-copy">
          <h1>Discover local deals happening right now</h1>
        </div>
      </div>
    </section>

    <section class="layout" aria-label="Deals content">
      <article class="panel">
        <h2>Featured Deals</h2>
        <div class="deal-grid" id="dealsGrid">
          <div class="loading">
            Loading deals...
          </div>
        </div>
      </article>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Local List. A local marketplace for Harrison.</p>
  </footer>

  <script src="header.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const db = window.firebaseDb;
    const auth = window.firebaseAuth;

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeDate(raw) {
      if (!raw) return null;
      if (raw.toDate && typeof raw.toDate === 'function') {
        return raw.toDate();
      }
      if (typeof raw.seconds === 'number') {
        return new Date(raw.seconds * 1000 + (raw.nanoseconds || 0) / 1e6);
      }
      const parsed = new Date(raw);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function getUrgencyKind(endRaw) {
      const end = normalizeDate(endRaw);
      if (!end) return '';
      const today = new Date();
      const startToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const endDay = new Date(end.getFullYear(), end.getMonth(), end.getDate());
      const diffDays = Math.round((endDay.getTime() - startToday.getTime()) / 86400000);
      if (diffDays < 0) return '';
      if (diffDays === 0) return 'today';
      if (diffDays <= 3) return 'soon';
      return '';
    }

    function formatDate(raw) {
      const date = normalizeDate(raw);
      if (!date) return 'N/A';
      return date.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function titleForCategory(rawCategory) {
      const category = String(rawCategory || '').trim();
      if (!category) return 'Deal';
      if (category.toLowerCase() === 'admin deal') return 'Deal';
      return category;
    }

    function getStatusText(status) {
      const value = String(status || '').trim();
      return value ? value : 'pending';
    }

    function isAdminDeal(deal) {
      const category = String(deal.dealsCategory || '').toLowerCase().trim();
      const role = String(deal.createdByRole || deal.role || '').toLowerCase().trim();
      return category.includes('admin') || role === 'admin';
    }

    function getDealCtaHref(deal, docId) {
      const serviceId = String(deal.serviceId || '').trim();
      if (serviceId) {
        return '/service-details.html?id=' + encodeURIComponent(serviceId);
      }
      const ownerUid = String(deal.businessId || deal.providerId || deal.userId || '').trim();
      if (ownerUid) {
        return '/business-profile.html?id=' + encodeURIComponent(ownerUid);
      }
      return '/deal-details.html?id=' + encodeURIComponent(docId);
    }

    async function getViewerIsAdmin() {
      const localAdmin = localStorage.getItem('isAdmin') === 'true';
      if (localAdmin) return true;
      if (!auth || !db) return false;

      try {
        const user = auth.currentUser;
        if (!user) return false;
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists) return false;
        const role = String((userDoc.data() || {}).role || '').toLowerCase();
        return role === 'admin';
      } catch (error) {
        console.error('Failed to check admin status:', error);
        return false;
      }
    }

    async function loadDeals(viewerIsAdmin) {
      const grid = document.getElementById('dealsGrid');
      if (!grid) return;

      if (!db) {
        grid.innerHTML = '<div class="empty-state">Firestore is not initialized. Check your Firebase SDK and config load order.</div>';
        return;
      }

      try {
        const snap = await db.collection('deals').orderBy('dealsStartdate', 'desc').get();

        if (snap.empty) {
          grid.innerHTML = '<div class="empty-state">No deals posted yet. Once deals are published, they will appear here.</div>';
          return;
        }

        const cards = [];
        snap.forEach((doc) => {
          const deal = doc.data() || {};
          if (!viewerIsAdmin && isAdminDeal(deal)) {
            return;
          }

          const title = escapeHtml(deal.dealsTitle || titleForCategory(deal.dealsCategory));
          const description = escapeHtml(deal.dealsDescription || 'No description available yet.');
          const imageUrlRaw = String(deal.dealsImageUrl || deal.dealImageUrl || '').trim();
          const thumbHtml = imageUrlRaw
            ? `<div class="deal-card-thumb-wrap"><img class="deal-card-thumb" src="${escapeHtml(imageUrlRaw)}" alt="" loading="lazy"></div>`
            : '';
          const status = escapeHtml(getStatusText(deal.dealsStatus));
          const isFeaturedDeal = deal.dealsisFeatured === true;
          const featured = isFeaturedDeal ? '<span class="meta-chip meta-chip--featured">Featured</span>' : '';
          const featuredClass = isFeaturedDeal ? ' featured' : '';
          const startDate = formatDate(deal.dealsStartdate);
          const endDate = formatDate(deal.dealsEnddate);
          const urgency = getUrgencyKind(deal.dealsEnddate);
          let urgencyHtml = '';
          if (urgency === 'today') {
            urgencyHtml = '<span class="urgency urgency--today">Ends Today</span>';
          } else           if (urgency === 'soon') {
            urgencyHtml = '<span class="urgency urgency--soon">Ending Soon</span>';
          }
          const detailHref = getDealCtaHref(deal, doc.id);
          const serviceNameRaw = String(deal.serviceName || '').trim();
          const serviceBadge = serviceNameRaw
            ? `<span class="meta-chip meta-chip--service" title="Linked service">${escapeHtml(serviceNameRaw)}</span>`
            : '';
          const headerBits = urgencyHtml;
          const headerRow = headerBits ? `<div class="deal-card-header-row">${headerBits}</div>` : '';

          cards.push(`
            <div class="deal-card${featuredClass}">
              ${headerRow}
              ${thumbHtml}
              <h3>${title}</h3>
              <div class="deal-meta">
                <span class="meta-chip">${status}</span>
                ${featured}
                ${serviceBadge}
              </div>
              <p class="deal-desc">${description}</p>
              <div class="deal-dates">
                <div class="expires">Starts: ${startDate}</div>
                <div class="expires">Ends: ${endDate}</div>
              </div>
              <a class="deal-view-btn" href="${detailHref}">View Deal</a>
            </div>
          `);
        });

        if (cards.length === 0) {
          grid.innerHTML = '<div class="empty-state">No deals are available to display right now.</div>';
          return;
        }

        grid.innerHTML = cards.join('');
      } catch (error) {
        console.error('Error loading deals:', error);
        grid.innerHTML = '<div class="empty-state">Could not load deals right now. Please try again.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const viewerIsAdmin = await getViewerIsAdmin();
      await loadDeals(viewerIsAdmin);
    });
  </script>
</body>
</html>
