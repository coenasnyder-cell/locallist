<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-533FSPH8JT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-533FSPH8JT');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Details - Local List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .back-link {
      color: #0066cc;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 20px;
      display: inline-block;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .pet-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 20px;
    }

    h1 {
      color: #475569;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .status-badge {
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
    }

    .badge-reunited {
      background: #4CAF50;
    }

    .badge-adopted {
      background: #2196F3;
    }

    .badge-lost {
      background: #FF9800;
    }

    .badge-found {
      background: #9C27B0;
    }

    .pet-image-section {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .pet-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pet-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 30px;
    }

    .info-card {
      background: white;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .info-label {
      font-size: 16px;
      color: #999;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 16px;
      color: #333;
      font-weight: 700;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      margin-bottom: 20px;
    }

    .section h2 {
      color: #333;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .section-content {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .adoption-fee {
      font-size: 28px;
      color: #2196F3;
      font-weight: 800;
    }

    .contact-button {
      width: 100%;
      padding: 14px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .contact-button:hover {
      background: #0052a3;
    }

    .pet-action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #b9d8f8;
      background: #f7fbff;
      color: #0b4f8a;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 12px;
    }

    .back-button:hover {
      background: #edf6ff;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }

    @media (max-width: 768px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }

      .pet-header {
        flex-direction: column;
      }

      .status-badge {
        margin-top: 12px;
      }

      .pet-action-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  
  <div class="container">
    <div id="content">
      <div class="loading">Loading pet details...</div>
    </div>
  </div>

  <!-- Script includes -->
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="header.js"></script>
  
  <script>
    const db = window.firebaseDb;
    const auth = window.firebaseAuth;
    const params = new URLSearchParams(window.location.search);
    const petId = params.get('id');

    let currentUser = null;
    let currentPet = null;

    auth.onAuthStateChanged((user) => {
      currentUser = user || null;
      // Re-render contact button visibility if pet is already loaded
      const contactBtn = document.getElementById('contactPetOwnerBtn');
      if (contactBtn && currentPet) {
        updateContactButton(contactBtn);
      }
    });

    function updateContactButton(btn) {
      if (currentUser && currentPet && currentUser.uid === currentPet.userId) {
        btn.disabled = true;
        btn.textContent = '📋 Your Listing';
        btn.style.background = '#94a3b8';
        btn.style.cursor = 'default';
      } else {
        btn.disabled = false;
        btn.textContent = 'Send Message';
        btn.style.background = '';
        btn.style.cursor = '';
      }
    }
    async function loadPetDetails() {
      try {
        if (!petId) {
          showError('Pet ID not provided');
          return;
        }

        const petSnapshot = await db.collection('pets').doc(petId).get();

        if (!petSnapshot.exists) {
          showError('Pet not found');
          return;
        }

        const pet = { id: petSnapshot.id, ...petSnapshot.data() };
        currentPet = pet;
        renderPetDetails(pet);
      } catch (error) {
        console.error('Error loading pet details:', error);
        showError('Error loading pet details. Please try again later.');
      }
    }

    function renderPetDetails(pet) {
      const statusBadgeClass = getBadgeClass(pet.petStatus);
      const statusLabel = getStatusLabel(pet.petStatus);
      const postTypeLabel = getPostTypeLabel(pet.postType);

      let html = `
        <div class="pet-header">
          <div>
            <h1>${pet.petName}</h1>
            <p style="color: #666; font-size: 14px; margin-top: 4px;">${postTypeLabel}</p>
          </div>
          <div class="status-badge ${statusBadgeClass}">
            ${statusLabel}
          </div>
        </div>

        <div class="pet-image-section">
      `;

      if (pet.petImages && pet.petImages.length > 0) {
        html += `<img src="${pet.petImages[0]}" alt="${pet.petName}" class="pet-image">`;
      } else {
        html += '<div class="pet-placeholder">🐾</div>';
      }

      html += `
        </div>

        <div class="content-grid">
          <div class="info-card">
            <div class="info-label">Type</div>
            <div class="info-value">${pet.petType}</div>
          </div>
          <div class="info-card">
            <div class="info-label">Breed</div>
            <div class="info-value">${pet.petBreed}</div>
          </div>
          <div class="info-card">
            <div class="info-label">Age</div>
            <div class="info-value">${pet.petAge}</div>
          </div>
          <div class="info-card">
            <div class="info-label">Gender</div>
            <div class="info-value">${pet.petGender}</div>
          </div>
        </div>

        <div class="section">
          <h2>📍 Last Seen Location</h2>
          <div class="section-content">${pet.petSeenLocation}</div>
        </div>

        <div class="section">
          <h2>ℹ️ Description</h2>
          <div class="section-content">${pet.petDescription}</div>
        </div>
      `;

      if (pet.postType === 'adoption' && pet.petAdoptionFee) {
        html += `
          <div class="section">
            <h2>💰 Adoption Fee</h2>
            <div class="adoption-fee">$${pet.petAdoptionFee}</div>
          </div>
        `;
      }

      html += `
        <div class="section">
          <h2>📅 Posted On</h2>
          <div class="section-content">${formatDate(pet.createdAt)}</div>
        </div>

        <div class="pet-action-row">
          <button class="contact-button" id="contactPetOwnerBtn" onclick="contactPetOwner()">📞 Contact Pet Owner</button>
          <a href="pet-hub.html" class="back-button">Back To The Pet Corner</a>
        </div>
      `;

      document.getElementById('content').innerHTML = html;

      // Hide button if viewer is the owner
      const contactBtn = document.getElementById('contactPetOwnerBtn');
      if (contactBtn) updateContactButton(contactBtn);
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `<div class="error">${message}</div>`;
    }

    function getBadgeClass(status) {
      switch(status) {
        case 'reunited': return 'badge-reunited';
        case 'adopted': return 'badge-adopted';
        case 'lost': return 'badge-lost';
        case 'found': return 'badge-found';
        default: return 'badge-found';
      }
    }

    function getStatusLabel(status) {
      switch(status) {
        case 'reunited': return '✓ Reunited';
        case 'adopted': return '✓ Adopted';
        case 'lost': return '🔍 Still Lost';
        case 'found': return '✓ Found';
        default: return status;
      }
    }

    function getPostTypeLabel(postType) {
      switch(postType) {
        case 'lost': return '🔍 Lost Pet';
        case 'found': return '✨ Found Pet';
        case 'adoption': return '💕 For Adoption';
        default: return postType;
      }
    }

    function formatDate(timestamp) {
      if (!timestamp) return '';
      try {
        let date;
        if (timestamp.seconds) {
          // Firestore timestamp
          date = new Date(timestamp.seconds * 1000);
        } else if (typeof timestamp === 'string') {
          date = new Date(timestamp);
        } else {
          date = new Date(timestamp);
        }
        return date.toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      } catch {
        return '';
      }
    }

    // Load pet details when page loads
    loadPetDetails();

    async function contactPetOwner() {
      if (!currentUser) {
        window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
        return;
      }

      if (!currentPet) return;

      const petOwnerId = currentPet.userId;

      if (!petOwnerId) {
        alert('Unable to contact the owner of this listing.');
        return;
      }

      if (currentUser.uid === petOwnerId) {
        alert('This is your own listing.');
        return;
      }

      const btn = document.getElementById('contactPetOwnerBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Opening chat…'; }

      try {
        // Look for an existing thread between these two users for this pet
        const existing = await db.collection('threads')
          .where('listingId', '==', petId)
          .where('participantIds', 'array-contains', currentUser.uid)
          .get();

        let threadId = null;

        if (!existing.empty) {
          // Pick the thread that also has the owner
          const match = existing.docs.find(d => {
            const ids = d.data().participantIds || [];
            return ids.includes(petOwnerId);
          });
          if (match) threadId = match.id;
        }

        if (!threadId) {
          // Create a new thread
          const postTypeLabel = getPostTypeLabel(currentPet.postType);
          const threadTitle = `${currentPet.petName} – ${postTypeLabel}`;
          const threadImage = (currentPet.petImages && currentPet.petImages.length > 0)
            ? currentPet.petImages[0]
            : '';

          const newThread = await db.collection('threads').add({
            participantIds: [currentUser.uid, petOwnerId],
            listingId: petId,
            listingType: 'pet',
            listingTitle: threadTitle,
            listingImage: threadImage,
            lastMessage: '',
            lastTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
            unreadBy: [petOwnerId],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          threadId = newThread.id;
        }

        window.location.href = `messages.html?threadId=${encodeURIComponent(threadId)}`;
      } catch (err) {
        console.error('Error opening chat:', err);
        alert('Could not open the chat. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = '📞 Contact Pet Owner'; }
      }
    }
  </script>
</body>
</html>
