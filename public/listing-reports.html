<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-533FSPH8JT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-533FSPH8JT');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Reports - Local List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #1f2937;
      min-height: 100vh;
    }

    #header-container {
      min-height: 60px;
    }

    .page-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .page-hero {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .page-title {
      font-size: 30px;
      font-weight: 800;
      color: #1f2937;
    }

    .reports-layout {
      display: grid;
      gap: 16px;
    }

    .report-section {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    .report-section-title {
      font-size: 20px;
      font-weight: 800;
      color: #334155;
    }

    .report-section-body {
      min-height: 120px;
    }

    .report-status {
      color: #64748b;
      font-size: 14px;
      line-height: 1.5;
    }

    .performance-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      color: #1d4ed8;
      line-height: 1.1;
    }

    .metric-label {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .performance-lists {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .report-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
    }

    .report-card-title {
      font-size: 15px;
      font-weight: 800;
      color: #334155;
      margin-bottom: 10px;
    }

    .mini-list {
      display: grid;
      gap: 8px;
    }

    .mini-list-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding-bottom: 8px;
      border-bottom: 1px solid #f1f5f9;
    }

    .mini-list-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .mini-list-title {
      font-size: 13px;
      font-weight: 700;
      color: #1f2937;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-list-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
      line-height: 1.4;
    }

    .mini-list-value {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      white-space: nowrap;
    }

    .empty-note {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .page-shell {
        padding: 16px 12px 28px;
      }

      .page-hero,
      .report-section {
        padding: 16px;
      }

      .page-title {
        font-size: 24px;
      }

      .report-section-title {
        font-size: 18px;
      }

      .report-section-body {
        min-height: 96px;
      }

      .performance-grid,
      .performance-lists {
        grid-template-columns: 1fr;
      }

      .metric-card,
      .report-card {
        padding: 12px;
      }

      .metric-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="page-shell">
    <section class="page-hero">
      <h1 class="page-title">Listing Reports</h1>
    </section>

    <div class="reports-layout">
      <section class="report-section">
        <h2 class="report-section-title">Admin Action Tasks</h2>
        <div class="report-section-body" id="listingPerformanceBody">
          <div class="report-status">Loading listing performance...</div>
        </div>
      </section>
       <section class="report-section">
        <h2 class="report-section-title">Marketplace</h2>
        <div class="report-section-body" id="activeExpiredBody">
          <div class="report-status">Loading listing status summary...</div>
        </div>
      </section>
      <section class="report-section">
        <h2 class="report-section-title">Users</h2>
        <div class="report-section-body"></div>
      </section>
      <section class="report-section">
        <h2 class="report-section-title">Business</h2>
        <div class="report-section-body"></div>
      </section>

      <section class="report-section">
        <h2 class="report-section-title">Services</h2>
        <div class="report-section-body"></div>
      </section>

      <section class="report-section">
        <h2 class="report-section-title">Payments</h2>
        <div class="report-section-body"></div>
      </section>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="header.js"></script>
  <script>
    (function () {
      const db = window.firebaseDb;

      function getTimestampMs(value) {
        if (!value) return null;
        if (typeof value === 'number') return Number.isFinite(value) ? value : null;
        if (typeof value === 'string') {
          const parsed = Date.parse(value);
          return Number.isNaN(parsed) ? null : parsed;
        }
        if (value instanceof Date) {
          const ms = value.getTime();
          return Number.isNaN(ms) ? null : ms;
        }
        if (typeof value === 'object') {
          if (typeof value.toMillis === 'function') {
            const ms = value.toMillis();
            return Number.isFinite(ms) ? ms : null;
          }
          if (typeof value.toDate === 'function') {
            const date = value.toDate();
            const ms = date && typeof date.getTime === 'function' ? date.getTime() : NaN;
            return Number.isFinite(ms) ? ms : null;
          }
          if (typeof value.seconds === 'number') {
            return value.seconds * 1000;
          }
        }
        return null;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
      }

      function formatDate(value) {
        const ms = getTimestampMs(value);
        if (!ms) return 'No date';
        return new Date(ms).toLocaleDateString();
      }

      function renderMiniList(items, valueFormatter, subFormatter) {
        if (!items.length) {
          return '<div class="empty-note">No listings to show yet.</div>';
        }

        return `
          <div class="mini-list">
            ${items.map((item) => `
              <div class="mini-list-row">
                <div>
                  <div class="mini-list-title">${escapeHtml(item.title || 'Untitled Listing')}</div>
                  <div class="mini-list-sub">${escapeHtml(subFormatter(item))}</div>
                </div>
                <div class="mini-list-value">${escapeHtml(valueFormatter(item))}</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      function isHiddenListing(item) {
        const status = String(item.status || '').toLowerCase();
        const approvalStatus = String(item.approvalStatus || '').toLowerCase();
        if (item.isDeleted === true || item.deleted === true) return true;
        if (item.isArchived === true || item.archived === true) return true;
        if (status === 'deleted' || status === 'rejected' || approvalStatus === 'deleted' || approvalStatus === 'rejected') return true;
        return false;
      }

      function isApprovedListing(item) {
        return String(item.status || '').toLowerCase() === 'approved' && !isHiddenListing(item);
      }

      function renderListingPerformance(metrics) {
        const performanceBody = document.getElementById('listingPerformanceBody');
        if (!performanceBody) return;

        performanceBody.innerHTML = `
          <div class="performance-grid">
            <div class="metric-card">
              <div class="metric-value">${metrics.totalListings}</div>
              <div class="metric-label">Total Listings</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${metrics.newListings}</div>
              <div class="metric-label">New Listings (7 Days)</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${metrics.activeListings}</div>
              <div class="metric-label">Active Listings</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${metrics.expiredListings}</div>
              <div class="metric-label">Expired Listings</div>
            </div>
          </div>
          <div class="performance-lists">
            <div class="report-card">
              <div class="report-card-title">Top Viewed Listings</div>
              ${renderMiniList(
                metrics.topViewed,
                (item) => `${item.viewCount || 0} views`,
                (item) => `Created ${formatDate(item.createdAt)}`
              )}
            </div>
            <div class="report-card">
              <div class="report-card-title">Lowest Views</div>
              ${renderMiniList(
                metrics.lowestViewed,
                (item) => `${item.viewCount || 0} views`,
                (item) => `Created ${formatDate(item.createdAt)}`
              )}
            </div>
            <div class="report-card">
              <div class="report-card-title">Expiring Soon</div>
              ${renderMiniList(
                metrics.expiringSoon,
                (item) => formatDate(item.expiresAt),
                (item) => `${item.viewCount || 0} views`
              )}
            </div>
          </div>
        `;
      }

      function renderActiveExpired(activeListings, expiredListings) {
        const body = document.getElementById('activeExpiredBody');
        if (!body) return;

        body.innerHTML = `
          <div class="performance-grid">
            <div class="metric-card">
              <div class="metric-value">${activeListings}</div>
              <div class="metric-label">Active</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${expiredListings}</div>
              <div class="metric-label">Expired</div>
            </div>
          </div>
        `;
      }

      async function loadListingPerformance() {
        const performanceBody = document.getElementById('listingPerformanceBody');
        const activeExpiredBody = document.getElementById('activeExpiredBody');

        if (!performanceBody || !activeExpiredBody) return;

        if (!db) {
          performanceBody.innerHTML = '<div class="report-status">Firestore is not available on this page.</div>';
          activeExpiredBody.innerHTML = '<div class="report-status">Firestore is not available on this page.</div>';
          return;
        }

        try {
          const snap = await db.collection('listings').get();
          const listings = snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          const nowMs = Date.now();
          const sevenDaysAgoMs = nowMs - (7 * 24 * 60 * 60 * 1000);
          const soonCutoffMs = nowMs + (7 * 24 * 60 * 60 * 1000);

          const totalListings = listings.length;
          const newListings = listings.filter((item) => {
            const createdAtMs = getTimestampMs(item.createdAt);
            return createdAtMs && createdAtMs >= sevenDaysAgoMs;
          }).length;

          const activeListingsPool = listings.filter((item) => {
            if (!isApprovedListing(item)) return false;
            const expiresAtMs = getTimestampMs(item.expiresAt);
            return !expiresAtMs || expiresAtMs > nowMs;
          });

          const expiredListingsPool = listings.filter((item) => {
            const expiresAtMs = getTimestampMs(item.expiresAt);
            const status = String(item.status || '').toLowerCase();
            return status === 'expired' || (!!expiresAtMs && expiresAtMs <= nowMs);
          });

          const topViewed = [...activeListingsPool]
            .sort((a, b) => (Number(b.viewCount) || 0) - (Number(a.viewCount) || 0))
            .slice(0, 5);

          const lowestViewed = [...activeListingsPool]
            .sort((a, b) => (Number(a.viewCount) || 0) - (Number(b.viewCount) || 0))
            .slice(0, 5);

          const expiringSoon = [...activeListingsPool]
            .filter((item) => {
              const expiresAtMs = getTimestampMs(item.expiresAt);
              return !!expiresAtMs && expiresAtMs > nowMs && expiresAtMs <= soonCutoffMs;
            })
            .sort((a, b) => (getTimestampMs(a.expiresAt) || 0) - (getTimestampMs(b.expiresAt) || 0))
            .slice(0, 5);

          renderListingPerformance({
            totalListings,
            newListings,
            activeListings: activeListingsPool.length,
            expiredListings: expiredListingsPool.length,
            topViewed,
            lowestViewed,
            expiringSoon,
          });

          renderActiveExpired(activeListingsPool.length, expiredListingsPool.length);
        } catch (error) {
          console.error('Listing performance load error:', error);
          performanceBody.innerHTML = '<div class="report-status">Could not load listing performance right now.</div>';
          activeExpiredBody.innerHTML = '<div class="report-status">Could not load listing status summary right now.</div>';
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadListingPerformance);
      } else {
        loadListingPerformance();
      }
    })();
  </script>
</body>
</html>
